<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Financeiro - Christian Shall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f0f0f; color: #fff; }
        .card-stat { background: #1a1a1a; border-radius: 15px; border-left: 5px solid #d4af37; padding: 20px; }
        .text-gold { color: #d4af37; }
        .table { color: #fff; }
    </style>
</head>
<body class="p-5">
    <div class="container">
        <div class="d-flex justify-content-between mb-5">
            <h2 class="text-gold">RESUMO FINANCEIRO</h2>
            <a href="{{ url_for('admin_agenda') }}" class="btn btn-gold">Voltar Agenda</a>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card-stat">
                    <h6>SALDO EM CAIXA</h6>
                    <h2 class="text-gold">R$ {{ "%.2f"|format(saldo) }}</h2>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card-stat h-100">
                    <h6>NOVO LANÇAMENTO</h6>
                    <form action="{{ url_for('lancar_transacao') }}" method="POST" class="row g-2">
                        <div class="col-md-4"><input type="text" name="descricao" class="form-control" placeholder="Descrição" required></div>
                        <div class="col-md-3"><input type="text" name="valor" class="form-control" placeholder="Valor" required></div>
                        <div class="col-md-3">
                            <select name="tipo_transacao" class="form-select">
                                <option value="Receita">Receita</option>
                                <option value="Despesa">Despesa</option>
                            </select>
                        </div>
                        <div class="col-md-2"><button class="btn btn-gold w-100">OK</button></div>
                    </form>
                </div>
            </div>
        </div>

        <div class="card-stat">
            <table class="table">
                <thead><tr><th>Data</th><th>Descrição</th><th>Barbeiro</th><th>Tipo</th><th>Valor</th></tr></thead>
                <tbody>
                    {% for t in transacoes %}
                    <tr>
                        <td>{{ t[4].strftime('%d/%m') }}</td>
                        <td>{{ t[0] }}</td>
                        <td>{{ t[3] }}</td>
                        <td>{{ t[2] }}</td>
                        <td class="{{ 'text-success' if t[2] == 'Receita' else 'text-danger' }}">R$ {{ t[1] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
